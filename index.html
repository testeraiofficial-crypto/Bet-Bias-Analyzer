<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GR Analyzer - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white font-sans antialiased">

    <div class="max-w-md mx-auto p-4 lg:max-w-6xl">
        <header class="mb-6 text-center lg:text-left">
            <h1 class="text-2xl font-bold text-emerald-400">GR ANALYZER</h1>
            <p class="text-xs text-slate-400 font-mono italic">St = S0 + [V * (RTP - 1)] * (1 + G)</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                <h2 class="text-lg font-semibold mb-4 border-b border-slate-700 pb-2">Input Parameters</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-slate-400">Initial Deposit (S0)</label>
                        <input type="number" id="s0" value="1000000" class="w-full bg-slate-700 rounded-lg p-2 mt-1 focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400">Target Turnover (V)</label>
                        <input type="range" id="v" min="0" max="10000000" step="100000" value="5000000" class="w-full accent-emerald-500">
                        <div class="flex justify-between text-xs mt-1 italic text-emerald-400" id="v-val">Rp 5.000.000</div>
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400">RTP Selection</label>
                        <div class="grid grid-cols-2 gap-2 mt-1">
                            <button onclick="setRTP(0.92)" class="rtp-btn bg-slate-700 p-2 rounded hover:bg-slate-600 transition">92%</button>
                            <button onclick="setRTP(0.96)" class="rtp-btn bg-emerald-600 p-2 rounded">96%</button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400">Gambler’s Fallacy (G)</label>
                        <input type="range" id="g" min="0" max="1" step="0.1" value="0.5" class="w-full accent-amber-500">
                        <div class="text-center text-xs mt-1 text-amber-400" id="g-desc">Moderate Chase-Loss Behavior</div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl text-center">
                    <p class="text-sm text-slate-400 uppercase tracking-widest">Final Balance (St)</p>
                    <div id="final-balance" class="text-4xl font-bold text-amber-500 my-2">Rp 0</div>
                    <div id="loss-impact" class="text-sm text-red-400"></div>
                </div>

                <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-xl">
                    <canvas id="balanceChart" height="200"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
